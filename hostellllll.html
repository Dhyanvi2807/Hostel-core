<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostelCare | Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --hostel-purple: #7458d9; /* Your original login color  */
            --cta-orange: #e88863;    /* Your original CTA color  */
        }
        body { background-color: var(--primary-bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Login Glassmorphism */
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #98a4f5 0%, #7458d9 100%);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        /* Dashboard Interface */
        .sidebar {
            background: white;
            height: 100vh;
            border-right: 1px solid #eee;
            padding: 2rem 1rem;
        }
        .nav-link {
            color: #666;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: 0.3s;
        }
        .nav-link.active, .nav-link:hover {
            background: var(--hostel-purple);
            color: white !important;
        }

        .category-card {
            border: none;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .category-card:hover { transform: translateY(-5px); }
        
        .btn-custom {
            background-color: var(--cta-orange);
            color: white;
            border-radius: 10px;
            padding: 12px;
            border: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div id="login-page" class="page active">
    <div class="login-container">
        <div class="login-card text-center">
            <i class="fas fa-hotel fa-3x mb-3" style="color: var(--hostel-purple);"></i>
            <h2 class="fw-bold mb-4">HostelCare</h2>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="emailInput" placeholder="name@example.com">
                <label for="emailInput">Email address</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="passInput" placeholder="Password">
                <label for="passInput">Password</label>
            </div>
            <button class="btn btn-custom w-100" onclick="showPage('dashboard-page')">Login</button>
        </div>
    </div>
</div>

<div id="dashboard-page" class="page d-none">
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 sidebar d-none d-md-block">
                <h4 class="fw-bold mb-5 text-center" style="color: var(--hostel-purple);">HostelCare</h4>
                <a class="nav-link active" href="#"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a class="nav-link" href="#" onclick="showPage('reporter-page')"><i class="fas fa-file-alt me-2"></i> Reports</a>
                <a class="nav-link mt-5 text-danger" href="#" onclick="showPage('login-page')"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">Welcome Back, Dhyanvi!</h2>
                    <span class="badge bg-light text-dark p-2 rounded-pill">Room 231 [cite: 186]</span>
                </div>

                <div class="alert alert-info border-0 rounded-4 p-4 shadow-sm mb-5">
                    <h5 class="fw-bold">Quick Reporting</h5>
                    <p class="mb-0">Select a category below to instantly notify the warden[cite: 191].</p>
                </div>

                <div class="row g-4">
                    <div class="col-6 col-lg-2">
                        <div class="category-card shadow-sm" style="background-color: #e65c8a;" onclick="showPage('reporter-page')">
                            <i class="fas fa-utensils fa-2x mb-2"></i><br>Food
                        </div>
                    </div>
                    <div class="col-6 col-lg-2">
                        <div class="category-card shadow-sm" style="background-color: #9973f0;" onclick="showPage('reporter-page')">
                            <i class="fas fa-wrench fa-2x mb-2"></i><br>Fixes
                        </div>
                    </div>
                    <div class="col-6 col-lg-2">
                        <div class="category-card shadow-sm" style="background-color: #4ebfae;" onclick="showPage('reporter-page')">
                            <i class="fas fa-broom fa-2x mb-2"></i><br>Cleaning
                        </div>
                    </div>
                    <div class="col-6 col-lg-2">
                        <div class="category-card shadow-sm" style="background-color: #5c8ae6;" onclick="showPage('reporter-page')">
                            <i class="fas fa-wifi fa-2x mb-2"></i><br>Wi-Fi
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<div id="reporter-page" class="page d-none">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-lg rounded-4 p-4">
                    <div class="d-flex justify-content-between mb-4">
                        <h3 class="fw-bold">New Complaint</h3>
                        <button class="btn btn-light rounded-pill" onclick="showPage('dashboard-page')">Cancel</button>
                    </div>
                    <form onsubmit="event.preventDefault(); alert('Reported successfully!'); showPage('dashboard-page');">
                        <div class="mb-3">
                            <label class="form-label fw-bold">What is the issue?</label>
                            <input type="text" class="form-control form-control-lg rounded-3" placeholder="e.g. No hot water in Gargi Hostel [cite: 43]">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Detailed Description</label>
                            <textarea class="form-control rounded-3" rows="4" placeholder="Tell us exactly what happened..."></textarea>
                        </div>
                        <button class="btn btn-custom w-100 py-3 shadow">Submit Report</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function showPage(pageId) {
        // Hide all pages
        document.querySelectorAll('.page').forEach(p => p.classList.add('d-none'));
        // Show selected page
        document.getElementById(pageId).classList.remove('d-none');
    }
</script>

</body>
</html>
